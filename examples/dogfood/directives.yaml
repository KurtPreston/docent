directives:
  - id: local-git
    name: local git projects working tree
    collector: local-git
    enabled: true
  - id: slakkr-gitea-activity
    name: Personal Gitea activity
    collector: gitea
    enabled: true
    target:
      owner: YOUR_GITEA_USER
    config:
      base_url: https://gitea.example.com
    credential_refs:
      token: SLAKKR_SLAKKR_GITEA_TOKEN
