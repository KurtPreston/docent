id: gitea-repository-discovery
name: Gitea Repository Discovery
description: Template for connecting to a Gitea server and discovering repositories to monitor.
collector: gitea
required_config:
  - name: base_url
    description: Gitea server base URL, such as https://git.example.com.
    required: true
  - name: token
    description: Gitea API token.
    required: true
    secret: true
required_target:
  - name: owner
    description: User or organization whose repositories should be listed.
    required: true
