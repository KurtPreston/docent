id: local-git-repository-status
name: Local Git Repository Status
description: Check local Git working trees for branch, latest commit, remote, and uncommitted changes. Without a target, scans all repos in projects.yaml that have paths_by_host for this host; with a target, scopes to one project/repo.
collector: local-git
defaults:
  schedule: every-status-check
  summary_prompt: Summarize branch, latest commit, remote divergence, and whether local changes need attention.
  config:
    checks: repository_status, branch_wip
    branch_lookback_days: "14"
examples:
  - name: Host-wide scan (all repos on this host)
  - name: Single project repo override
    target:
      project_id: slakkr-ai
      repo_id: slakkr-ai
