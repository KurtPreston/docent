id: github-enterprise-pull-requests
name: GitHub Enterprise Pull Request Updates
description: Use the GitHub CLI against a GitHub Enterprise host to list open pull requests.
collector: github-enterprise
required_config:
  - name: base_url
    description: Enterprise GitHub base URL, such as https://github.example.com.
    required: true
required_target:
  - name: repo
    description: Repository in owner/name form.
    required: true
