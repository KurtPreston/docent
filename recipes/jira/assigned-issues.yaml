id: jira-assigned-issues
name: JIRA Assigned Issues
description: Template for checking assigned or recently updated JIRA issues.
collector: jira
required_config:
  - name: base_url
    description: JIRA base URL.
    required: true
  - name: email
    description: Atlassian account email (Jira Cloud API token auth).
    required: true
  - name: query
    description: JQL query for relevant issues.
    required: true
  - name: token
    description: Jira Cloud API token.
    required: true
    secret: true
