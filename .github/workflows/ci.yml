name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 1.18 is the supported floor (matches go.mod). GOTOOLCHAIN=local means
        # this job fails loudly if the go directive is ever bumped above 1.18 or
        # a newer stdlib import sneaks in. "stable" catches the other direction.
        go-version: ["1.18", "stable"]
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build applications
        run: go build -o /dev/null ./apps/...

      - name: Vet
        run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Run tests
        run: go test ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/docentd/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/docentd/web/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

  embed:
    name: Embed build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/docentd/web/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Build dashboard
        working-directory: apps/docentd/web
        run: npm ci && npm run build

      - name: Build docentd with embedded dashboard
        run: go build -tags embed -o /dev/null ./apps/docentd
